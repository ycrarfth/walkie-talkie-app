<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyre Shop Group Talkie</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .btn-container { margin-top: 50px; }
        #ptt-btn { 
            width: 150px; height: 150px; border-radius: 50%;
            background: #e74c3c; border: 8px solid #c0392b;
            font-weight: bold; color: white; font-size: 18px;
            cursor: pointer; transition: 0.2s;
        }
        #ptt-btn.active { background: #2ecc71; border-color: #27ae60; transform: scale(0.9); }
        .info { color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>TYRE SHOP GROUP</h2>
    <div class="info" id="status">Connecting...</div>

    <div class="btn-container">
        <button id="ptt-btn">PUSH TO TALK</button>
    </div>

    <script>
        const socket = io('/');
        const myPeer = new Peer();
        const pttBtn = document.getElementById('ptt-btn');
        const statusText = document.getElementById('status');
        const ROOM_ID = "tyre-shop-123"; // Ellavarum ee roomil ayirikkum
        
        let myStream;
        const peers = {};

        // Mic access edukkuka
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            myStream = stream;
            // Default aayi mic mute aaki vekkuka
            myStream.getAudioTracks()[0].enabled = false;

            myPeer.on('call', call => {
                call.answer(stream); // Call varumbol automatic answer
                const audio = document.createElement('audio');
                call.on('stream', userStream => {
                    addAudioStream(audio, userStream);
                });
            });

            socket.on('user-connected', userId => {
                connectToNewUser(userId, stream);
            });
        });

        myPeer.on('open', id => {
            socket.emit('join-room', ROOM_ID, id);
            statusText.innerText = "Online - Group Connected";
        });

        // PTT Button Functions
        function startTalking() {
            if(myStream) {
                myStream.getAudioTracks()[0].enabled = true;
                pttBtn.classList.add('active');
                pttBtn.innerText = "SAMSARIKKU...";
            }
        }

        function stopTalking() {
            if(myStream) {
                myStream.getAudioTracks()[0].enabled = false;
                pttBtn.classList.remove('active');
                pttBtn.innerText = "PUSH TO TALK";
            }
        }

        pttBtn.addEventListener('mousedown', startTalking);
        pttBtn.addEventListener('mouseup', stopTalking);
        pttBtn.addEventListener('touchstart', startTalking);
        pttBtn.addEventListener('touchend', stopTalking);

        function connectToNewUser(userId, stream) {
            const call = myPeer.call(userId, stream);
            const audio = document.createElement('audio');
            call.on('stream', userStream => {
                addAudioStream(audio, userStream);
            });
            peers[userId] = call;
        }

        function addAudioStream(audio, stream) {
            audio.srcObject = stream;
            audio.addEventListener('loadedmetadata', () => {
                audio.play();
            });
        }
    </script>
</body>
</html>
